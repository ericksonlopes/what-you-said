services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - INSTALL_GPU=${INSTALL_GPU:-false}
    ports:
      - 5000:5000
    networks:
      - wys_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    environment:
      - APP__ENV=${APP__ENV:-production}
      - APP__LIST_LOG_LEVELS=${APP__LIST_LOG_LEVELS:-INFO,WARNING,ERROR,CRITICAL}
      - MODEL_EMBEDDING__NAME=${MODEL_EMBEDDING__NAME:-paraphrase-multilingual-MiniLM-L12-v2}
      # Vector store settings
      - VECTOR__STORE_TYPE=${VECTOR__STORE_TYPE:-faiss}
      - VECTOR__COLLECTION_NAME_CHUNKS=${VECTOR__COLLECTION_NAME_CHUNKS:-chunks}
      - VECTOR__WEAVIATE_HOST=${VECTOR__WEAVIATE_HOST:-weaviate}
      - VECTOR__WEAVIATE_PORT=${VECTOR__WEAVIATE_PORT:-8080}
      - VECTOR__WEAVIATE_API_KEY=${VECTOR__WEAVIATE_API_KEY:-}
      - VECTOR__WEAVIATE_GRPC_PORT=${VECTOR__WEAVIATE_GRPC_PORT:-50051}
      - VECTOR__CHROMA_HOST=${VECTOR__CHROMA_HOST:-chroma}
      - VECTOR__CHROMA_PORT=${VECTOR__CHROMA_PORT:-8000}
      - VECTOR__QDRANT_HOST=${VECTOR__QDRANT_HOST:-qdrant}
      - VECTOR__QDRANT_PORT=${VECTOR__QDRANT_PORT:-6333}
      - VECTOR__QDRANT_GRPC_PORT=${VECTOR__QDRANT_GRPC_PORT:-6334}
      - VECTOR__QDRANT_API_KEY=${VECTOR__QDRANT_API_KEY:-}
      # SQL settings
      - SQL__TYPE=${SQL__TYPE:-sqlite}
      - SQL__HOST=${SQL__HOST:-}
      - SQL__PORT=${SQL__PORT:-}
      - SQL__USER=${SQL__USER:-}
      - SQL__PASSWORD=${SQL__PASSWORD:-}
      - SQL__DATABASE=${SQL__DATABASE:-}
      - SQL__URL=${SQL__URL:-}
      - REDIS__HOST=${REDIS__HOST:-redis}
      - REDIS__PORT=${REDIS__PORT:-6379}
      - REDIS__PASSWORD=${REDIS__PASSWORD:-}
      - INSTALL_GPU=${INSTALL_GPU:-false}
      - YOUTUBE__PROXY_ENABLED=${YOUTUBE__PROXY_ENABLED:-false}
      - YOUTUBE__PROXY_URL=${YOUTUBE__PROXY_URL:-}
      - AUTH__ENABLE_GOOGLE=${AUTH__ENABLE_GOOGLE:-false}
      - AUTH__GOOGLE_CLIENT_ID=${AUTH__GOOGLE_CLIENT_ID:-}
      - AUTH__GOOGLE_CLIENT_SECRET=${AUTH__GOOGLE_CLIENT_SECRET:-}
      - AUTH__REDIRECT_URI=${AUTH__REDIRECT_URI:-}
      - AUTH__JWT_SECRET=${AUTH__JWT_SECRET:-}
      - STORAGE__MINIO_URL=${STORAGE__MINIO_URL:-http://minio:9000}
      - STORAGE__MINIO_ROOT_USER=${STORAGE__MINIO_ROOT_USER:-root}
      - STORAGE__MINIO_ROOT_PASSWORD=${STORAGE__MINIO_ROOT_PASSWORD:-password}
      - STORAGE__MINIO_BUCKET=${STORAGE__MINIO_BUCKET:-whatyousaid}
      - AUTH__HF_TOKEN=${AUTH__HF_TOKEN:-}
      - NNPACK_DISABLE=${NNPACK_DISABLE:-1}
    shm_size: '2gb'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 3001:80
    networks:
      - wys_network
    environment:
      - APP_URL=${APP_URL:-https://localhost:5000}
    depends_on:
      backend:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: minio_server
    profiles:
      - minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${STORAGE__MINIO_ACCESS_KEY:-root}
      - MINIO_ROOT_PASSWORD=${STORAGE__MINIO_SECRET_KEY:-password}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - wys_network

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    networks:
      - wys_network
    command: redis-server --requirepass ${REDIS__PASSWORD:-password}

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.35.9
    profiles:
      - weaviate
      - base
    ports:
      - 8081:8080
      - 50051:50051
    networks:
      - wys_network
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/data/weaviate'
      CLUSTER_HOSTNAME: 'node1'

  chroma:
    image: chromadb/chroma:0.5.23
    profiles:
      - chroma
    ports:
      - 8000:8000
    networks:
      - wys_network
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
      - PERSIST_DIRECTORY=/data/chroma

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
      - base
    ports:
      - 5432:5432
    networks:
      - wys_network
    environment:
      POSTGRES_USER: ${SQL__USER:-user}
      POSTGRES_PASSWORD: ${SQL__PASSWORD:-pass}
      POSTGRES_DB: ${SQL__DATABASE:-whatyousaid}
      PGDATA: /var/lib/postgresql/data

  mysql:
    image: mysql:8.0
    profiles:
      - mysql
    ports:
      - 3306:3306
    networks:
      - wys_network
    environment:
      MYSQL_ROOT_PASSWORD: ${SQL__ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${SQL__DATABASE:-whatyousaid}
      MYSQL_USER: ${SQL__USER:-user}
      MYSQL_PASSWORD: ${SQL__PASSWORD:-pass}
    command: --datadir=/var/lib/mysql

  mariadb:
    image: mariadb:11
    profiles:
      - mariadb
    ports:
      - 3307:3306
    networks:
      - wys_network
    environment:
      MARIADB_ROOT_PASSWORD: ${SQL__ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${SQL__DATABASE:-whatyousaid}
      MARIADB_USER: ${SQL__USER:-user}
      MARIADB_PASSWORD: ${SQL__PASSWORD:-pass}
    command: --datadir=/var/lib/mysql

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles:
      - mssql
    ports:
      - 1433:1433
    networks:
      - wys_network
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL__PASSWORD:-Password123!}
      MSSQL_PID: "Express"
      MSSQL_DATA_DIR: /var/opt/mssql
      MSSQL_LOG_DIR: /var/opt/mssql/log
      MSSQL_BACKUP_DIR: /var/opt/mssql/backup

  qdrant:
    image: qdrant/qdrant:v1.13.2
    profiles:
      - qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - wys_network
    environment:
      - QDRANT__SERVICE__API_KEY=${VECTOR__QDRANT_API_KEY:-}

networks:
  wys_network:
    driver: bridge

volumes:
  minio_data:

