services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - 5000:5000
    networks:
      - wys_network
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    environment:
      - APP__ENV=${APP__ENV:-production}
      - APP__LIST_LOG_LEVELS=${APP__LIST_LOG_LEVELS:-INFO,WARNING,ERROR,CRITICAL}
      - MODEL_EMBEDDING__NAME=${MODEL_EMBEDDING__NAME:-paraphrase-multilingual-MiniLM-L12-v2}
      - VECTOR__STORE_TYPE=${VECTOR__STORE_TYPE:-faiss}
      - VECTOR__COLLECTION_NAME_CHUNKS=${VECTOR__COLLECTION_NAME_CHUNKS:-chunks}
      - VECTOR__WEAVIATE_HOST=${VECTOR__WEAVIATE_HOST:-weaviate}
      - VECTOR__WEAVIATE_PORT=${VECTOR__WEAVIATE_PORT:-8080}
      - VECTOR__WEAVIATE_API_KEY=${VECTOR__WEAVIATE_API_KEY:-}
      - VECTOR__WEAVIATE_GRPC_PORT=${VECTOR__WEAVIATE_GRPC_PORT:-50051}
      - VECTOR__CHROMA_HOST=${VECTOR__CHROMA_HOST:-chroma}
      - VECTOR__CHROMA_PORT=${VECTOR__CHROMA_PORT:-8000}
      # SQL settings
      - SQL__TYPE=${SQL__TYPE:-sqlite}
      - SQL__HOST=${SQL__HOST:-}
      - SQL__PORT=${SQL__PORT:-}
      - SQL__USER=${SQL__USER:-}
      - SQL__PASSWORD=${SQL__PASSWORD:-}
      - SQL__DATABASE=${SQL__DATABASE:-}
      - SQL__URL=${SQL__URL:-}
    volumes:
      - .:/app
      - /app/.venv
      - ./data/app:/data/app
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 3001:80
    networks:
      - wys_network
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.35.9
    profiles:
      - weaviate
      - base
    ports:
      - 8081:8080
      - 50051:50051
    networks:
      - wys_network
    volumes:
      - ./data/weaviate:/data/weaviate
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/data/weaviate'
      CLUSTER_HOSTNAME: 'node1'

  chroma:
    image: chromadb/chroma:0.5.23
    profiles:
      - chroma
    ports:
      - 8000:8000
    networks:
      - wys_network
    volumes:
      - ./data/chroma:/data/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
      - PERSIST_DIRECTORY=/data/chroma

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
      - base
    ports:
      - 5432:5432
    networks:
      - wys_network
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${SQL__USER:-user}
      POSTGRES_PASSWORD: ${SQL__PASSWORD:-pass}
      POSTGRES_DB: ${SQL__DATABASE:-whatyousaid}
      PGDATA: /var/lib/postgresql/data

  mysql:
    image: mysql:8.0
    profiles:
      - mysql
    ports:
      - 3306:3306
    networks:
      - wys_network
    volumes:
      - ./data/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${SQL__ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${SQL__DATABASE:-whatyousaid}
      MYSQL_USER: ${SQL__USER:-user}
      MYSQL_PASSWORD: ${SQL__PASSWORD:-pass}
    command: --datadir=/var/lib/mysql

  mariadb:
    image: mariadb:11
    profiles:
      - mariadb
    ports:
      - 3307:3306
    networks:
      - wys_network
    volumes:
      - ./data/mariadb:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${SQL__ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${SQL__DATABASE:-whatyousaid}
      MARIADB_USER: ${SQL__USER:-user}
      MARIADB_PASSWORD: ${SQL__PASSWORD:-pass}
    command: --datadir=/var/lib/mysql

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles:
      - mssql
    ports:
      - 1433:1433
    networks:
      - wys_network
    volumes:
      - ./data/mssql:/var/opt/mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL__PASSWORD:-Password123!}
      MSSQL_PID: "Express"
      MSSQL_DATA_DIR: /var/opt/mssql
      MSSQL_LOG_DIR: /var/opt/mssql/log
      MSSQL_BACKUP_DIR: /var/opt/mssql/backup

networks:
  wys_network:
    driver: bridge
