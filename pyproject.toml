[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "what-you-said"
version = "1.0.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "langchain-text-splitters>=1.1.1",
    "pydantic-settings>=2.13.1",
    "sentence-transformers>=5.2.3",
    "youtube-transcript-api>=1.2.4",
    "torch>=2.9.1",
    "yt-dlp>=2026.3.3",
    "uvicorn>=0.42.0",
    "alembic>=1.18.4",
    "fastapi>=0.135.1",
    "langchain-community>=0.4.1",
]

[project.optional-dependencies]
weaviate = [
    "langchain-weaviate>=0.0.6",
]
faiss = [
    "faiss-cpu>=1.13.2",
]
mysql = [
    "pymysql>=1.1.1",
    "cryptography>=44.0.0",
]
mariadb = [
    "pymysql>=1.1.1",
    "cryptography>=44.0.0",
]
mssql = [
    "python-tds>=1.15.0",
]
postgres = [
    "psycopg2-binary>=2.9.10",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "mypy>=1.19.1",
    "ruff>=0.15.6",
    "bandit>=1.8.3",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cpu" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true


[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
